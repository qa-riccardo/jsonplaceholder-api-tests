name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci
        env:
          FORCE_COLOR: '1'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

      - name: Write step summary
        if: always()
        run: node scripts/generate-summary.js

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then ICON="✅"; COLOR="good"; else ICON="❌"; COLOR="danger"; fi

          XML="test-results/junit.xml"
          if [ -f "$XML" ]; then
            TOTAL=$(grep -oP '(?<=<!-- tests )\d+' "$XML" || echo "?")
            PASS=$(grep -oP '(?<=<!-- pass )\d+' "$XML" || echo "?")
            FAIL=$(grep -oP '(?<=<!-- fail )\d+' "$XML" || echo "?")
            SKIP=$(grep -oP '(?<=<!-- skipped )\d+' "$XML" || echo "?")
            DURATION_MS=$(grep -oP '(?<=<!-- duration_ms )[\d.]+' "$XML" || echo "0")
            DURATION=$(echo "scale=2; $DURATION_MS / 1000" | bc)s
          else
            TOTAL="?"; PASS="?"; FAIL="?"; SKIP="?"; DURATION="?s"
          fi

          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"title\": \"$ICON API Tests — $STATUS\",
                \"fields\": [
                  {\"title\": \"✅ Passed\",  \"value\": \"$PASS\",     \"short\": true},
                  {\"title\": \"❌ Failed\",  \"value\": \"$FAIL\",     \"short\": true},
                  {\"title\": \"⏭️ Skipped\", \"value\": \"$SKIP\",     \"short\": true},
                  {\"title\": \"⏱️ Duration\",\"value\": \"$DURATION\", \"short\": true}
                ],
                \"footer\": \"Trigger: ${{ github.event_name }} | Branch: ${{ github.ref_name }} | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"
              }]
            }"
